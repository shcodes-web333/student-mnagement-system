
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>
<style>
/* ====== CSS ====== */
body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    text-align: center;
     height: 101vh;           /* ارتفاع الصفحة كامل */
     margin: 0;     
}
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: rgba(143, 143, 143, 0.33);
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: url('img.jpg.jpg') center / cover no-repeat;
        filter: blur(3px);
        transform: scale(1.1);
        z-index: -1;
    }


.container {
    width: 89%;
    margin: auto;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter:blur(10px);
    padding: 29px;
    border-radius: 14px;
    box-shadow: 0 0 8px rgba(0, 37, 123, 0.68);
}

input {
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter:blur(10px);
    padding: 10px;
    margin: 8px;
}

button {
    padding: 10px 20px;
    background: #2ecc71;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #27ae60;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
}

th {
    background: #3498db;
    color: white;
}

.deleteBtn {
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.deleteBtn:hover {
    background: darkred;
}
</style>
</head>

<body>

<h1>Student Management System</h1>

<div class="container">

    <h2>Add Student</h2>

    <form id="studentForm">
        <input type="text" id="name" placeholder="Student Name" required>
        <input type="number" id="id" placeholder="Student ID" required>
        <input type="number" id="grade" placeholder=" Grade" required>
        <button type="submit">Add Student</button>
    </form>

    <h2>Students List</h2>

    <table id="studentTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>ID</th>
                <th>graid</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

</div>

<script>
/* ====== JavaScript ====== */
const form = document.getElementById("studentForm");
const table = document.querySelector("#studentTable tbody");

form.addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let id = document.getElementById("id").value;
    let age = document.getElementById("Grade").value;

    let row = table.insertRow();

    row.insertCell(0).innerText = name;
    row.insertCell(1).innerText = id;
    row.insertCell(2).innerText = age;

    let deleteCell = row.insertCell(3);
    let btn = document.createElement("button");
    btn.innerText = "Delete";
    btn.classList.add("deleteBtn");

    btn.onclick = function() {
        row.remove();
    }

    deleteCell.appendChild(btn);

    form.reset();
});
</script>

</body>
</html>
